name: Bug report
description: Report a reproducible defect in code, scripts, configs, workflows, or documentation.
title: "bug(scope): "
body:
  - type: markdown
    attributes:
      value: |
        Use this for a concrete, reproducible defect.
        Do not paste secrets, tokens, credentials, private keys, or private configuration.
  - type: input
    id: area
    attributes:
      label: Area or component
      placeholder: CLI, API, UI, docs, workflow, build, deployment
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest command/config/code path that reproduces the bug.
      placeholder: |
        1. Run `...`
        2. With config `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the relevant error message or traceback.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Branch / commit:
        - Runtime / language version:
        - Operating system or platform:
        - Deployment or hosting context, if relevant:
        - Related service versions, if relevant:
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Suggested validation
      description: How should a fix be verified?
  - type: textarea
    id: additional
    attributes:
      label: Additional context
