name: Proposal / RFC
description: Propose a broad design, policy, interface, migration, or high-impact change.
title: "rfc(scope): "
body:
  - type: markdown
    attributes:
      value: |
        Use this before changes with broad impact, unclear tradeoffs, migration cost, or policy implications.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are we solving, and why now?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the proposed design or policy.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      value: |
        - User-facing impact:
        - Backward compatibility:
        - Migration required:
        - Operational risk:
    validations:
      required: true
  - type: textarea
    id: rollout
    attributes:
      label: Rollout / validation plan
      value: |
        - [ ] Prototype or proof of concept
        - [ ] Targeted tests
        - [ ] Smoke test or staged rollout
        - [ ] Documentation
        - [ ] Rollback plan
    validations:
      required: true
  - type: textarea
    id: open-questions
    attributes:
      label: Open questions
