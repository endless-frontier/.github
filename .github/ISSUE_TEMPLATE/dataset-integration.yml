name: Dataset integration
description: Add or maintain a benchmark/dataset, including prompts, tasks, manifests, images, and configs.
title: "dataset(scope): "
labels: ["type/dataset", "state/needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for dataset onboarding or maintenance. Preinstall images are tracked here as part of the dataset lifecycle.
  - type: checkboxes
    id: affected-repos
    attributes:
      label: Affected repositories
      options:
        - label: innovator-agent
        - label: innovator-harbor
        - label: innovator-slime
  - type: input
    id: dataset
    attributes:
      label: Dataset / benchmark
      placeholder: terminal-bench-2, swe-atlas-tw, featurebench-lv1
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should this integration enable?
    validations:
      required: true
  - type: textarea
    id: dataset-artifacts
    attributes:
      label: Dataset artifacts
      value: |
        - Task root:
        - prompts.jsonl:
        - image-manifest.jsonl:
        - source manifest, if any:
        - registry namespace:
        - preinstall registry namespace, if any:
    validations:
      required: true
  - type: textarea
    id: harbor-surface
    attributes:
      label: Harbor surface
      value: |
        - Evaluation config:
        - Environment type:
        - Agent:
        - Verifier behavior:
        - Required Harbor changes:
  - type: textarea
    id: slime-surface
    attributes:
      label: Slime / training surface
      value: |
        - Prompt data:
        - Task path template:
        - Rollout settings:
        - Required Slime changes:
  - type: textarea
    id: image-plan
    attributes:
      label: Image / registry plan
      description: Include base image, task image, preinstall contents, and rollback image if relevant.
      value: |
        - Base image:
        - Task image namespace:
        - Preinstall contents:
        - Rollback / previous namespace:
  - type: textarea
    id: validation
    attributes:
      label: Validation
      value: |
        - [ ] Metadata files parse
        - [ ] Images can be pulled from ACK
        - [ ] 1-task smoke evaluation passes
        - [ ] Training dry-run command assembles, if applicable
        - [ ] Documentation / runbook updated
    validations:
      required: true
  - type: textarea
    id: links
    attributes:
      label: Links
      description: Related PRs, runs, dashboards, manifests, or external dataset references.
