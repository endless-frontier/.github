name: Engineering task
description: Track a scoped implementation, maintenance, documentation, or operational change.
title: "task(scope): "
body:
  - type: input
    id: area
    attributes:
      label: Area or component
      placeholder: CLI, API, UI, docs, workflow, build, deployment
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What concrete outcome should this task produce?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      value: |
        In scope:
        - 

        Out of scope:
        - 
    validations:
      required: true
  - type: textarea
    id: plan
    attributes:
      label: Proposed implementation
      description: High-level approach, files likely touched, commands likely needed, or rollout steps.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] 
        - [ ] Validation command or manual check is documented
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks / rollback
      description: What could break, and how can this be reverted or mitigated?
  - type: textarea
    id: links
    attributes:
      label: Links
