name: Run / job failure
description: Triage a concrete failed job, workflow, deployment, batch run, or scheduled task.
title: "run(scope): "
body:
  - type: markdown
    attributes:
      value: |
        Use this for log-driven investigation of a concrete failed run.
        Redact secrets, tokens, credentials, private keys, and private configuration before attaching logs.
  - type: dropdown
    id: failure-stage
    attributes:
      label: Failure stage
      options:
        - unknown
        - config validation
        - dependency installation
        - build or packaging
        - test or verification
        - environment startup
        - deployment
        - runtime
        - external service
        - cleanup or aggregation
    validations:
      required: true
  - type: input
    id: job-name
    attributes:
      label: Job / run name
      placeholder: nightly-build-20260624, deploy-prod-1234
  - type: input
    id: run-path
    attributes:
      label: Run URL or artifact path
      placeholder: https://... or logs/runs/<job-name>
  - type: textarea
    id: command
    attributes:
      label: Command, workflow, or trigger
      description: Paste the exact command, workflow name, trigger, or deployment action used.
      render: shell
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Config / environment
      description: List the config file and important env vars. Redact credentials.
      value: |
        - Config:
        - Environment:
        - Runtime:
        - External services:
        - Recent related changes:
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Failure summary
      description: Summarize the failure count, impact, and repeated error pattern if available.
  - type: textarea
    id: representative-error
    attributes:
      label: Representative error
      description: Paste one representative log, traceback, status output, or event slice.
      render: shell
    validations:
      required: true
  - type: textarea
    id: hypothesis
    attributes:
      label: Current hypothesis
      description: What do you think is happening? It is fine to write "unknown".
  - type: textarea
    id: done
    attributes:
      label: Done when
      description: What should be true before this issue is closed?
      value: |
        - [ ] Failure class is identified
        - [ ] Fix or operational mitigation is documented
        - [ ] Smoke run, retry, or targeted validation passes
    validations:
      required: true
