name: Run failure
description: Triage a failed training, evaluation, ACK, agent, or verifier run.
title: "run(scope): "
labels: ["type/run-failure", "state/needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for log-driven investigation of a concrete run.
        Redact secrets, tokens, private kubeconfigs, and credentials before attaching logs.
  - type: checkboxes
    id: affected-repos
    attributes:
      label: Affected repositories
      options:
        - label: innovator-agent
        - label: innovator-harbor
        - label: innovator-slime
  - type: dropdown
    id: failure-stage
    attributes:
      label: Failure stage
      options:
        - unknown
        - config validation
        - environment start
        - ACK / SandboxClaim / pod
        - agent setup
        - agent runtime
        - verifier
        - training / rollout
        - result aggregation
    validations:
      required: true
  - type: input
    id: job-name
    attributes:
      label: Job / run name
      placeholder: tb2-20260528T000000Z
  - type: input
    id: run-path
    attributes:
      label: Run artifact path
      placeholder: trials/runs/<job-name>
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command or launcher used.
      render: shell
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Config / environment
      description: List the config file and important env vars. Redact credentials.
      value: |
        - Config:
        - Dataset / TASK_ROOT:
        - Registry:
        - Agent:
        - Model backend:
        - Kubeconfig context:
    validations:
      required: true
  - type: textarea
    id: result-summary
    attributes:
      label: result.json summary
      description: Paste a jq summary if available.
      render: json
  - type: textarea
    id: representative-error
    attributes:
      label: Representative error
      description: Paste one representative exception.txt / trial.log / pod event slice.
      render: shell
    validations:
      required: true
  - type: textarea
    id: hypothesis
    attributes:
      label: Current hypothesis
      description: What do you think is happening? It is fine to write "unknown".
  - type: textarea
    id: done
    attributes:
      label: Done when
      description: What should be true before this issue is closed?
      value: |
        - [ ] Failure class is identified
        - [ ] Fix or operational mitigation is documented
        - [ ] Smoke run or targeted validation passes
    validations:
      required: true
